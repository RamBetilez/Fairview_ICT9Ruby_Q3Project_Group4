<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blue Way - Home</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f5f7fa; 
    }
    h2 {
      font-weight: 900; 
    }
    .hero-img {
      max-width: 400px;
      height: auto;
    }
    footer {
      background-color: #343a40;
      color: white;
      padding: 12px 0;
      margin-top: 40px;
    }
  </style>
</head>

<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

      <a class="navbar-brand" href="#">
        <img src="https://www.iconsdb.com/icons/preview/royal-blue/motorcycle-xxl.png" 
             alt="Logo" height="35">
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
        <span class="navbar-toggler-icon"></span>
      </button>  

      <div class="collapse navbar-collapse" id="mynavbar">

        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link active" href="#">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Fare Matrix</a>
          </li>
          <li class="nav-item">
               <a class="nav-link" href="#">Schedule</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Help</a>
          </li>
        </ul>

        <form class="d-flex ms-auto">
          <button class="btn btn-primary px-4" type="button">
            Create Account
          </button>
        </form>

      </div> 
    </div>
  </nav> 

  <div class="container text-center mt-5">

    <p class="fw-bold display-4" style="color: #0B4E8A;">
      BLUE WAY
    </p>

    <img class="img-fluid rounded shadow hero-img mt-3" 
         src="https://images.gmanews.tv/webpics/2025/12/3_2025_12_20_16_32_41.jpg" 
         alt="Motorcycle Ride">

    <div class="mt-4">

      <h2>
        Experience fast rides with no traffic!
      </h2>

      <p class="text-muted">
        Book now and enjoy your first ride anywhere, anytime.
      </p>

    </div>

    <details class="mt-3" ontoggle="showInstructions()">
      <summary><u>Instructions</u></summary>
      <p id="instructionText"></p>
    </details>

    <footer>
      | Eliana Daet Grade 9-Ruby
      <br>
      Source: <a href="https://www.metrolinemap.com/metro/manila/" target="_blank" style="color: #0B4E8A;">Metro Manila Rail Map</a>
    </footer>

  </div>

  <script>
    function showInstructions() {
      document.getElementById('instructionText').textContent =
        "Please press the Create Account button to start booking your ride!";
    }

    window.onload = function() {
      alert("Reminder: press the instructions button for more information!");
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
